```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booky V2</title>
    <style>
        /* Base Reset & Variables */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #222222;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 700; /* Bold all text universally */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Minimalist Rounded Popup */
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 440px;
            padding: 3.5rem;
            border-radius: 24px; /* Significantly rounded edges */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 1.2rem;
            letter-spacing: -0.5px;
        }

        .modal p {
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Forms */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .submit-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 1rem;
            font-size: 0.95rem;
            border-radius: 12px; /* Rounded button edges */
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #e5e5e5;
        }
    </style>
</head>
<body>

    <div class="modal">
        <h2>Coming Soon!</h2>
        <p>There's nothing here... yet. Check back later even though there still probably wont be something</p>
        <form onsubmit="event.preventDefault(); alert('Saved.');">
            <div class="form-group">
                <button type="submit" class="submit-btn">OK</button>
            </div>
        </form>
    </div>

</body>
</html>
